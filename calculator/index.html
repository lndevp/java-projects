<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precision Calculator</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #101114;
      --panel: #181b20;
      --panel-2: #20242b;
      --panel-3: #2a3038;
      --text: #f8fafc;
      --muted: #9aa4b2;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #4fb3ff;
      --accent-2: #41d3a2;
      --danger: #ff6b7a;
      --warning: #ffd166;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(79, 179, 255, 0.12), transparent 30%),
        linear-gradient(315deg, rgba(65, 211, 162, 0.1), transparent 32%),
        var(--page);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 330px;
      gap: 22px;
      padding: 28px;
      align-items: center;
    }

    .calculator {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 27, 32, 0.94);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand strong {
      font-size: 15px;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .toggles {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill {
      min-width: 58px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel-2);
      cursor: pointer;
    }

    .pill.active {
      color: #061014;
      border-color: transparent;
      background: var(--accent-2);
      font-weight: 800;
    }

    .pill:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .display {
      min-height: 168px;
      padding: 24px 22px 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
    }

    .expression {
      min-height: 28px;
      color: var(--muted);
      font-size: clamp(18px, 3vw, 24px);
      line-height: 1.3;
      text-align: right;
      word-break: break-word;
    }

    .result {
      min-height: 64px;
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1;
      text-align: right;
      letter-spacing: 0;
      word-break: break-word;
    }

    .preview {
      min-height: 22px;
      color: var(--accent-2);
      font-size: 16px;
      text-align: right;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.16);
    }

    .key {
      min-height: 58px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      font-size: 18px;
      font-weight: 750;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .key:hover {
      transform: translateY(-2px);
      background: var(--panel-3);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .key:active {
      transform: translateY(0) scale(0.98);
    }

    .number {
      background: #252a32;
    }

    .operator {
      color: #061014;
      background: var(--accent);
    }

    .equals {
      grid-column: span 2;
      color: #061014;
      background: var(--accent-2);
      font-size: 22px;
    }

    .danger {
      color: #21070b;
      background: var(--danger);
    }

    .warning {
      color: #1c1401;
      background: var(--warning);
    }

    .span-2 {
      grid-column: span 2;
    }

    .side {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 27, 32, 0.9);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.24);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .small-btn {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .memory-value {
      padding: 16px;
      color: var(--accent-2);
      font-size: 24px;
      word-break: break-word;
    }

    .history {
      max-height: 410px;
      overflow: auto;
      padding: 8px;
    }

    .history-item {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      color: var(--text);
      background: transparent;
      text-align: right;
      cursor: pointer;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .history-expression {
      color: var(--muted);
      font-size: 13px;
      word-break: break-word;
    }

    .history-result {
      margin-top: 4px;
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
      word-break: break-word;
    }

    .empty {
      padding: 20px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        padding: 16px;
        align-items: start;
      }

      .side {
        display: grid;
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app {
        min-height: auto;
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px;
      }

      .display {
        min-height: 132px;
        padding: 18px 14px 14px;
      }

      .result {
        min-height: 46px;
        font-size: clamp(34px, 13vw, 52px);
      }

      .keypad {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
      }

      .key {
        min-height: 54px;
        border-radius: 8px;
        font-size: 16px;
      }

      .span-2 {
        grid-column: span 1;
      }

      .equals {
        grid-column: span 2;
      }

      .zero {
        grid-column: span 1;
      }

      .key[data-action="clear"] { order: 1; }
      .key[data-action="backspace"] { order: 2; }
      .key[data-value="("] { order: 3; }
      .key[data-value=")"] { order: 4; }

      .key[data-value="7"] { order: 5; }
      .key[data-value="8"] { order: 6; }
      .key[data-value="9"] { order: 7; }
      .key[data-value="÷"] { order: 8; }

      .key[data-value="4"] { order: 9; }
      .key[data-value="5"] { order: 10; }
      .key[data-value="6"] { order: 11; }
      .key[data-value="×"] { order: 12; }

      .key[data-value="1"] { order: 13; }
      .key[data-value="2"] { order: 14; }
      .key[data-value="3"] { order: 15; }
      .key[data-value="-"] { order: 16; }

      .zero { order: 17; }
      .key[data-value="."] { order: 18; }
      .key[data-action="toggle-sign"] { order: 19; }
      .key[data-value="+"] { order: 20; }

      .key[data-action="equals"] { order: 21; }
      .key[data-action="copy"] { order: 22; grid-column: span 2; }

      .key[data-action="memory-clear"] { order: 23; }
      .key[data-action="memory-recall"] { order: 24; }
      .key[data-action="memory-add"] { order: 25; }
      .key[data-action="memory-subtract"] { order: 26; }

      .key[data-fn="sin"] { order: 27; }
      .key[data-fn="cos"] { order: 28; }
      .key[data-fn="tan"] { order: 29; }
      .key[data-fn="sqrt"] { order: 30; }

      .key[data-fn="ln"] { order: 31; }
      .key[data-fn="log"] { order: 32; }
      .key[data-value="π"] { order: 33; }
      .key[data-value="e"] { order: 34; }

      .key[data-value="^"] { order: 35; }
      .key[data-action="square"] { order: 36; }
      .key[data-action="inverse"] { order: 37; }
      .key[data-value="%"] { order: 38; }
    }

    @media (max-width: 390px) {
      .keypad {
        gap: 6px;
      }

      .key {
        min-height: 46px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="calculator" aria-label="Calculator">
      <header class="topbar">
        <div class="brand">
          <strong>Precision Calculator</strong>
          <span>Fast, clean, and precise</span>
        </div>
        <div class="toggles" aria-label="Calculator settings">
          <button class="pill active" id="degButton" type="button">DEG</button>
          <button class="pill" id="radButton" type="button">RAD</button>
          <button class="pill" id="resultFormatButton" type="button" disabled>DEC</button>
        </div>
      </header>

      <section class="display" aria-live="polite">
        <div class="expression" id="expression">0</div>
        <div class="result" id="result">0</div>
        <div class="preview" id="preview"></div>
      </section>

      <section class="keypad" aria-label="Calculator keys">
        <button class="key danger" data-action="clear">AC</button>
        <button class="key warning" data-action="backspace">⌫</button>
        <button class="key" data-value="(">(</button>
        <button class="key" data-value=")">)</button>
        <button class="key scientific" data-action="memory-clear">MC</button>
        <button class="key scientific" data-action="memory-recall">MR</button>

        <button class="key scientific" data-fn="sin">sin</button>
        <button class="key scientific" data-fn="cos">cos</button>
        <button class="key scientific" data-fn="tan">tan</button>
        <button class="key operator" data-value="÷">÷</button>
        <button class="key scientific" data-action="memory-add">M+</button>
        <button class="key scientific" data-action="memory-subtract">M−</button>

        <button class="key scientific" data-fn="sqrt">√</button>
        <button class="key scientific" data-fn="ln">ln</button>
        <button class="key scientific" data-fn="log">log</button>
        <button class="key operator" data-value="×">×</button>
        <button class="key scientific" data-value="π">π</button>
        <button class="key scientific" data-value="e">e</button>

        <button class="key number" data-value="7">7</button>
        <button class="key number" data-value="8">8</button>
        <button class="key number" data-value="9">9</button>
        <button class="key operator" data-value="-">−</button>
        <button class="key scientific" data-value="^">xʸ</button>
        <button class="key scientific" data-action="square">x²</button>

        <button class="key number" data-value="4">4</button>
        <button class="key number" data-value="5">5</button>
        <button class="key number" data-value="6">6</button>
        <button class="key operator" data-value="+">+</button>
        <button class="key scientific" data-action="inverse">1/x</button>
        <button class="key scientific" data-value="%">%</button>

        <button class="key number" data-value="1">1</button>
        <button class="key number" data-value="2">2</button>
        <button class="key number" data-value="3">3</button>
        <button class="key equals" data-action="equals">=</button>
        <button class="key scientific span-2" data-action="copy">Copy</button>

        <button class="key number span-2 zero" data-value="0">0</button>
        <button class="key number" data-value=".">.</button>
        <button class="key" data-action="toggle-sign">±</button>
      </section>
    </section>

    <aside class="side">
      <section class="panel">
        <div class="panel-header">
          <h2>Memory</h2>
          <button class="small-btn" id="resetMemory" type="button">Clear</button>
        </div>
        <div class="memory-value" id="memoryValue">0</div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>History</h2>
          <button class="small-btn" id="clearHistory" type="button">Clear</button>
        </div>
        <div class="history" id="history">
          <div class="empty">No calculations yet.</div>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");
    const previewEl = document.getElementById("preview");
    const historyEl = document.getElementById("history");
    const memoryValueEl = document.getElementById("memoryValue");
    const degButton = document.getElementById("degButton");
    const radButton = document.getElementById("radButton");
    const resultFormatButton = document.getElementById("resultFormatButton");

    let expression = "";
    let lastResult = null;
    let memory = 0;
    let degreeMode = true;
    let resultDisplayMode = "smart";
    let currentResultValue = 0;
    let currentResultStatus = "";
    let history = [];

    const operators = new Set(["+", "-", "×", "÷", "^"]);
    const binaryOperators = new Set(["+", "-", "×", "÷", "^"]);
    const functions = new Set(["sin", "cos", "tan", "sqrt", "log", "ln"]);

    document.querySelectorAll("[data-value]").forEach((button) => {
      button.addEventListener("click", () => appendValue(button.dataset.value));
    });

    document.querySelectorAll("[data-fn]").forEach((button) => {
      button.addEventListener("click", () => appendFunction(button.dataset.fn));
    });

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => handleAction(button.dataset.action));
    });

    document.getElementById("clearHistory").addEventListener("click", () => {
      history = [];
      renderHistory();
    });

    document.getElementById("resetMemory").addEventListener("click", () => {
      memory = 0;
      updateMemory();
    });

    degButton.addEventListener("click", () => setDegreeMode(true));
    radButton.addEventListener("click", () => setDegreeMode(false));
    resultFormatButton.addEventListener("click", toggleResultFormat);

    document.addEventListener("keydown", (event) => {
      if (event.key >= "0" && event.key <= "9") appendValue(event.key);
      else if (event.key === ".") appendValue(".");
      else if (event.key === "+") appendValue("+");
      else if (event.key === "-") appendValue("-");
      else if (event.key === "*" || event.key.toLowerCase() === "x") appendValue("×");
      else if (event.key === "/") appendValue("÷");
      else if (event.key === "^") appendValue("^");
      else if (event.key === "%") appendValue("%");
      else if (event.key === "(" || event.key === ")") appendValue(event.key);
      else if (event.key === "Enter" || event.key === "=") {
        event.preventDefault();
        calculate();
      } else if (event.key === "Backspace") {
        event.preventDefault();
        backspace();
      } else if (event.key === "Escape") {
        clearAll();
      }
    });

    function appendValue(value) {
      if (lastResult !== null) {
        if (binaryOperators.has(value) || value === "%") {
          lastResult = null;
        } else {
          expression = "";
          lastResult = null;
          currentResultStatus = "";
        }
      }

      const last = lastChar();

      if (value === ".") {
        if (currentNumberHasDecimal()) return;
        if (!expression || operators.has(last) || last === "(") expression += "0";
      }

      if (value === ")") {
        if (!canCloseParenthesis()) return;
      }

      if (value === "%") {
        if (!canAppendPostfix()) return;
      }

      if (value === "(" && needsImplicitMultiply()) {
        expression += "×";
      }

      if ((value === "π" || value === "e") && needsImplicitMultiply()) {
        expression += "×";
      }

      if (binaryOperators.has(value)) {
        if (expression === "") {
          if (value !== "-") return;
        } else if (last === "(" && value !== "-") {
          return;
        } else if (binaryOperators.has(last)) {
          if (value === "-" && last !== "-") {
            expression += value;
            updateDisplay();
            return;
          }
          if (last === "-" && binaryOperators.has(expression.at(-2))) {
            expression = expression.slice(0, -2) + value;
            updateDisplay();
            return;
          }
          expression = expression.slice(0, -1) + value;
          updateDisplay();
          return;
        } else if (last === ".") {
          return;
        }
      }

      expression += value;
      updateDisplay();
    }

    function appendFunction(name) {
      if (lastResult !== null) {
        expression = "";
        lastResult = null;
      }
      if (needsImplicitMultiply()) expression += "×";
      expression += `${name}(`;
      updateDisplay();
    }

    async function handleAction(action) {
      if (action === "clear") clearAll();
      else if (action === "backspace") backspace();
      else if (action === "equals") {
        calculate();
        return;
      } else if (action === "toggle-sign") toggleSign();
      else if (action === "square") expression = wrapExpression("(", ")^2");
      else if (action === "inverse") expression = wrapExpression("1/(", ")");
      else if (action === "copy") {
        await copyResult();
        return;
      } else if (action === "memory-clear") memory = 0;
      else if (action === "memory-recall") appendValue(formatNumber(memory));
      else if (action === "memory-add") memory += getCurrentValue();
      else if (action === "memory-subtract") memory -= getCurrentValue();
      updateMemory();
      updateDisplay();
    }

    function wrapExpression(prefix, suffix) {
      const value = expression || (lastResult !== null ? formatNumber(lastResult) : "0");
      return `${prefix}${value}${suffix}`;
    }

    function clearAll() {
      expression = "";
      lastResult = null;
      currentResultValue = 0;
      currentResultStatus = "";
      updateDisplay();
    }

    function backspace() {
      if (lastResult !== null) {
        clearAll();
        return;
      }
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function toggleSign() {
      if (!expression) {
        expression = "-";
        return;
      }
      const match = expression.match(/(-?\d+(\.\d+)?)$/);
      if (!match) return;
      const start = match.index;
      const number = match[0];
      const replacement = number.startsWith("-") ? number.slice(1) : `-${number}`;
      expression = expression.slice(0, start) + replacement;
    }

    function calculate() {
      if (!expression) return;
      try {
        const finalExpression = prepareExpression(expression);
        const value = evaluateExpression(finalExpression);
        if (!Number.isFinite(value)) throw new Error("Result is not finite");
        const rendered = renderResult(value, "Done");
        history.unshift({ expression: finalExpression, result: rendered.primary });
        history = history.slice(0, 18);
        lastResult = value;
        expression = rendered.expressionValue;
        expressionEl.textContent = history[0].expression;
        renderHistory();
      } catch (error) {
        resultEl.textContent = "Error";
        previewEl.textContent = error.message;
        updateResultFormatButton(null);
      }
    }

    function getCurrentValue() {
      try {
        return evaluateExpression(expression || "0");
      } catch {
        return 0;
      }
    }

    async function copyResult() {
      const value = resultEl.textContent;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
        } else {
          copyWithFallback(value);
        }
        previewEl.textContent = "Copied";
      } catch {
        try {
          copyWithFallback(value);
          previewEl.textContent = "Copied";
        } catch {
          selectResultText();
          previewEl.textContent = "Selected";
        }
      }
    }

    function updateDisplay() {
      expressionEl.textContent = expression || "0";
      if (!expression) {
        resultEl.textContent = "0";
        previewEl.textContent = "";
        updateResultFormatButton(null);
        return;
      }

      try {
        const value = evaluateExpression(prepareExpression(expression));
        renderResult(value, "Live result");
      } catch {
        resultEl.textContent = lastResult === null ? "0" : formatNumber(lastResult);
        previewEl.textContent = "";
        updateResultFormatButton(null);
      }
    }

    function renderHistory() {
      historyEl.innerHTML = "";
      if (history.length === 0) {
        historyEl.innerHTML = '<div class="empty">No calculations yet.</div>';
        return;
      }

      history.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "history-item";
        button.innerHTML = `
          <div class="history-expression">${escapeHtml(item.expression)}</div>
          <div class="history-result">${escapeHtml(item.result)}</div>
        `;
        button.addEventListener("click", () => {
          expression = item.result;
          lastResult = Number(item.result);
          updateDisplay();
        });
        historyEl.appendChild(button);
      });
    }

    function updateMemory() {
      memoryValueEl.textContent = formatNumber(memory);
    }

    function setDegreeMode(enabled) {
      degreeMode = enabled;
      degButton.classList.toggle("active", enabled);
      radButton.classList.toggle("active", !enabled);
      updateDisplay();
    }

    function toggleResultFormat() {
      const fraction = getFraction(currentResultValue);
      if (!fraction) return;
      resultDisplayMode = resultDisplayMode === "decimal" ? "smart" : "decimal";
      renderResult(currentResultValue, currentResultStatus || "Live result");
    }

    function renderResult(value, status) {
      currentResultValue = value;
      currentResultStatus = status;

      const fraction = getFraction(value);
      const decimal = formatDecimal(value);
      const showFraction = resultDisplayMode === "smart" && fraction;
      const primary = showFraction ? fraction.text : decimal;

      resultEl.textContent = primary;
      updateResultFormatButton(fraction);

      if (fraction && showFraction) {
        previewEl.textContent = `${status} | ${decimal}`;
      } else if (fraction) {
        previewEl.textContent = `${status} | ${fraction.text}`;
      } else {
        previewEl.textContent = status;
      }

      return {
        primary,
        expressionValue: showFraction ? fraction.text : toCalculationString(value)
      };
    }

    function updateResultFormatButton(fraction) {
      resultFormatButton.disabled = !fraction;
      resultFormatButton.textContent = resultDisplayMode === "decimal" ? "a/b" : "DEC";
    }

    function evaluateExpression(input) {
      const tokens = tokenize(input);
      const rpn = toReversePolish(tokens);
      return evaluateReversePolish(rpn);
    }

    function prepareExpression(input) {
      let output = input.trim();
      while (output && (binaryOperators.has(output.at(-1)) || output.at(-1) === ".")) {
        output = output.slice(0, -1);
      }
      const open = (output.match(/\(/g) || []).length;
      const closed = (output.match(/\)/g) || []).length;
      if (open > closed) output += ")".repeat(open - closed);
      if (!output || output === "-") return "0";
      return output;
    }

    function needsImplicitMultiply() {
      if (!expression) return false;
      const last = lastChar();
      return isDigit(last) || last === ")" || last === "%" || last === "π" || last === "e";
    }

    function canAppendPostfix() {
      if (!expression) return false;
      const last = lastChar();
      return isDigit(last) || last === ")" || last === "π" || last === "e";
    }

    function canCloseParenthesis() {
      const open = (expression.match(/\(/g) || []).length;
      const closed = (expression.match(/\)/g) || []).length;
      if (open <= closed) return false;
      const last = lastChar();
      return Boolean(last) && !binaryOperators.has(last) && last !== "(" && last !== ".";
    }

    function copyWithFallback(value) {
      const input = document.createElement("textarea");
      input.value = value;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.opacity = "0";
      document.body.appendChild(input);
      input.select();
      const copied = document.execCommand("copy");
      document.body.removeChild(input);
      if (!copied) throw new Error("Copy command failed");
    }

    function selectResultText() {
      const range = document.createRange();
      range.selectNodeContents(resultEl);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function tokenize(input) {
      const tokens = [];
      let index = 0;
      const normalized = input.replaceAll("×", "*").replaceAll("÷", "/").replaceAll("π", "pi");

      while (index < normalized.length) {
        const char = normalized[index];
        if (char === " ") {
          index++;
          continue;
        }

        const previous = tokens[tokens.length - 1];
        const unaryMinus = char === "-" && (!previous || previous.type === "operator" || previous.value === "(");
        if (isDigit(char) || char === "." || unaryMinus) {
          let number = unaryMinus ? "-" : "";
          if (unaryMinus) index++;
          while (index < normalized.length && (isDigit(normalized[index]) || normalized[index] === ".")) {
            number += normalized[index++];
          }
          if (number === "-" || number === "." || number === "-.") throw new Error("Invalid number");
          tokens.push({ type: "number", value: Number(number) });
          continue;
        }

        if (/[a-z]/i.test(char)) {
          let word = "";
          while (index < normalized.length && /[a-z]/i.test(normalized[index])) {
            word += normalized[index++];
          }
          if (word === "pi") tokens.push({ type: "number", value: Math.PI });
          else if (word === "e") tokens.push({ type: "number", value: Math.E });
          else if (functions.has(word)) tokens.push({ type: "function", value: word });
          else throw new Error(`Unknown token: ${word}`);
          continue;
        }

        if ("+-*/^%()".includes(char)) {
          tokens.push({ type: char === "(" || char === ")" ? "paren" : "operator", value: char });
          index++;
          continue;
        }

        throw new Error(`Unexpected character: ${char}`);
      }

      return tokens;
    }

    function toReversePolish(tokens) {
      const output = [];
      const stack = [];
      const precedence = { "%": 5, "^": 4, "*": 3, "/": 3, "+": 2, "-": 2 };
      const rightAssociative = new Set(["^"]);

      for (const token of tokens) {
        if (token.type === "number") output.push(token);
        else if (token.type === "function") stack.push(token);
        else if (token.type === "operator") {
          while (stack.length) {
            const top = stack[stack.length - 1];
            if (top.type === "function") {
              output.push(stack.pop());
              continue;
            }
            if (top.type !== "operator") break;
            const shouldPop = rightAssociative.has(token.value)
              ? precedence[token.value] < precedence[top.value]
              : precedence[token.value] <= precedence[top.value];
            if (!shouldPop) break;
            output.push(stack.pop());
          }
          stack.push(token);
        } else if (token.value === "(") {
          stack.push(token);
        } else if (token.value === ")") {
          while (stack.length && stack[stack.length - 1].value !== "(") {
            output.push(stack.pop());
          }
          if (!stack.length) throw new Error("Mismatched parentheses");
          stack.pop();
          if (stack.length && stack[stack.length - 1].type === "function") output.push(stack.pop());
        }
      }

      while (stack.length) {
        const token = stack.pop();
        if (token.value === "(" || token.value === ")") throw new Error("Mismatched parentheses");
        output.push(token);
      }

      return output;
    }

    function evaluateReversePolish(tokens) {
      const stack = [];
      for (const token of tokens) {
        if (token.type === "number") {
          stack.push(token.value);
        } else if (token.type === "function") {
          if (stack.length < 1) throw new Error("Missing function input");
          stack.push(applyFunction(token.value, stack.pop()));
        } else if (token.type === "operator") {
          if (token.value === "%") {
            if (stack.length < 1) throw new Error("Missing percent input");
            stack.push(stack.pop() / 100);
            continue;
          }
          if (stack.length < 2) throw new Error("Missing operator input");
          const right = stack.pop();
          const left = stack.pop();
          stack.push(applyOperator(token.value, left, right));
        }
      }
      if (stack.length !== 1) throw new Error("Incomplete expression");
      return stack[0];
    }

    function applyOperator(operator, left, right) {
      if (operator === "+") return left + right;
      if (operator === "-") return left - right;
      if (operator === "*") return left * right;
      if (operator === "/") {
        if (right === 0) throw new Error("Cannot divide by zero");
        return left / right;
      }
      if (operator === "^") return Math.pow(left, right);
      throw new Error(`Unknown operator: ${operator}`);
    }

    function applyFunction(name, value) {
      const angle = degreeMode ? value * Math.PI / 180 : value;
      if (name === "sin") return Math.sin(angle);
      if (name === "cos") return Math.cos(angle);
      if (name === "tan") return Math.tan(angle);
      if (name === "sqrt") {
        if (value < 0) throw new Error("Square root needs a non-negative number");
        return Math.sqrt(value);
      }
      if (name === "log") {
        if (value <= 0) throw new Error("Log needs a positive number");
        return Math.log10(value);
      }
      if (name === "ln") {
        if (value <= 0) throw new Error("Ln needs a positive number");
        return Math.log(value);
      }
      throw new Error(`Unknown function: ${name}`);
    }

    function formatNumber(value) {
      return formatDecimal(value);
    }

    function formatDecimal(value) {
      if (!Number.isFinite(value)) return "Error";
      const rounded = Math.abs(value) < 1e-12 ? 0 : value;
      const absolute = Math.abs(rounded);

      if (absolute !== 0 && (absolute >= 1e12 || absolute < 1e-8)) {
        return rounded.toExponential(8).replace(/\.?0+e/, "e");
      }

      return rounded
        .toFixed(10)
        .replace(/\.?0+$/, "");
    }

    function toCalculationString(value) {
      if (!Number.isFinite(value)) return "0";
      if (Math.abs(value) < 1e-12) return "0";
      if (Number.isInteger(value)) return String(value);
      const fixed = value.toFixed(12).replace(/\.?0+$/, "");
      return fixed.includes("e") ? value.toPrecision(12) : fixed;
    }

    function getFraction(value) {
      if (!Number.isFinite(value) || Math.abs(value) < 1e-12 || Number.isInteger(value)) return null;

      const sign = value < 0 ? -1 : 1;
      const target = Math.abs(value);
      let bestNumerator = 0;
      let bestDenominator = 1;
      let bestError = Infinity;

      for (let denominator = 1; denominator <= 999; denominator++) {
        const numerator = Math.round(target * denominator);
        const error = Math.abs(target - numerator / denominator);
        if (error < bestError) {
          bestError = error;
          bestNumerator = numerator;
          bestDenominator = denominator;
        }
      }

      if (bestError > 1e-10 || bestNumerator === 0) return null;

      const divisor = gcd(bestNumerator, bestDenominator);
      const numerator = sign * (bestNumerator / divisor);
      const denominator = bestDenominator / divisor;
      if (denominator === 1) return null;

      return {
        numerator,
        denominator,
        text: `${numerator}/${denominator}`
      };
    }

    function gcd(a, b) {
      let left = Math.abs(a);
      let right = Math.abs(b);
      while (right) {
        const next = left % right;
        left = right;
        right = next;
      }
      return left || 1;
    }

    function currentNumberHasDecimal() {
      const match = expression.match(/(\d+\.\d*|\d+|\.\d*)$/);
      return Boolean(match && match[0].includes("."));
    }

    function lastChar() {
      return expression[expression.length - 1];
    }

    function isDigit(char) {
      return char >= "0" && char <= "9";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    updateDisplay();
    updateMemory();
  </script>
</body>
